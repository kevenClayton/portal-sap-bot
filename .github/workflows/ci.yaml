# CI sem secrets: valida PHP + frontend em cada push/PR.
# Deploy continua manual no servidor (git pull, composer, npm, worker).
name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, sqlite, pdo_sqlite
          coverage: none
      - name: Composer e testes
        run: |
          composer install --no-interaction --prefer-dist
          cp .env.example .env
          php artisan key:generate --no-interaction
          php artisan test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Build Vite
        run: |
          npm ci
          npm run build
